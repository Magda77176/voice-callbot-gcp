name: CI/CD — Voice Callbot GCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: jarvis-v2-488311
  REGION: us-central1
  SERVICE_NAME: voice-callbot

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install flask twilio elevenlabs httpx
          pip install opentelemetry-api opentelemetry-sdk
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v \
            -k "not KnowledgeBase and not IntentDetection" \
            --tb=short

  deploy:
    name: Deploy to Cloud Run
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --memory 512Mi \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=$REGION,VERTEX_MODEL=gemini-2.0-flash-001,PUBSUB_TOPIC=callbot-events"

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION --project $PROJECT_ID \
            --format='value(status.url)')
          
          echo "Testing $SERVICE_URL..."
          
          # Health check
          HEALTH=$(curl -s "$SERVICE_URL/health")
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q "healthy" || exit 1
          
          # Cache stats
          CACHE=$(curl -s "$SERVICE_URL/cache/stats")
          echo "Cache: $CACHE"
          
          echo "✅ Smoke tests passed"
